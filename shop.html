<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop | BANYON STREET</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .shop-header {
            padding: calc(var(--spacing-xl) + 60px) 4vw var(--spacing-md);
            text-align: center;
        }

        .filters {
            display: flex;
            justify-content: center;
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-lg);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.1em;
        }

        .filters .btn {
            border: none;
            border-bottom: 2px solid transparent;
            padding: 0.5rem 1rem;
        }

        .filters .btn.active,
        .filters .btn:hover {
            border-bottom: 2px solid var(--color-text);
            background: transparent;
            color: var(--color-text);
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            background: var(--color-light-gray);
            /* Borders between products */
            border-top: 2px solid var(--color-light-gray);
        }

        .product-card {
            background: var(--color-bg);
            display: flex;
            flex-direction: column;
            padding-bottom: var(--spacing-md);
        }

        .product-img-wrapper {
            position: relative;
            padding-top: 130%;
            /* Aspect ratio */
            overflow: hidden;
            background: #f8f8f8;
        }

        .product-img-wrapper img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: transform 0.6s ease;
        }

        .product-card:hover .product-img-wrapper img {
            transform: scale(1.03);
        }

        .product-info {
            padding: var(--spacing-sm) var(--spacing-sm) 0;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .product-title {
            font-size: 1rem;
            margin-bottom: 0.25rem;
        }

        .product-price {
            font-size: 0.9rem;
            color: var(--color-accent);
        }

        @media (max-width: 900px) {
            .product-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .product-grid {
                grid-template-columns: 1fr;
            }

            .filters {
                flex-wrap: wrap;
            }
        }
    </style>
</head>

<body>

    <!-- Header / Navigation -->
    <header
        style="background: var(--color-bg); mix-blend-mode: normal; color: var(--color-text); border-bottom: 1px solid var(--color-light-gray);">
        <div class="logo"><a href="index.html">Banyon Street</a></div>
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="shop.html">Shop</a>
            <a href="lookbook.html">Lookbook</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </nav>
        <div class="cart-icon">
            <a href="#">Cart (0)</a>
        </div>
    </header>

    <main>

        </div>

        <div class="filters fade-in" id="shop-filters">
            <button class="btn active" data-filter="all">All</button>
            <button class="btn" data-filter="tops">Tops</button>
            <button class="btn" data-filter="bottoms">Bottoms</button>
            <button class="btn" data-filter="outerwear">Outerwear</button>
            <button class="btn" data-filter="accessories">Accessories</button>
            <span style="border-left: 1px solid var(--color-border); margin: 0 10px;"></span>
            <button class="btn" data-filter="size">Size</button>
        </div>

        <section class="product-grid" id="shop-grid">
            <a href="product.html" class="product-card fade-in" data-category="tops">
                <div class="product-img-wrapper">
                    <img src="https://images.unsplash.com/photo-1556821840-3a63f95609a7?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80"
                        alt="Heavyweight Hoodie">
                </div>
                <div class="product-info">
                    <div>
                        <h3 class="product-title">Heavyweight Hoodie - Onyx</h3>
                        <p class="product-price">$120</p>
                    </div>
                </div>
            </a>

            <a href="product.html" class="product-card fade-in" data-category="tops">
                <div class="product-img-wrapper">
                    <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80"
                        alt="Core T-Shirt">
                </div>
                <div class="product-info">
                    <div>
                        <h3 class="product-title">Core Boxy Tee - Bone</h3>
                        <p class="product-price">$55</p>
                    </div>
                </div>
            </a>

            <a href="product.html" class="product-card fade-in">
                <div class="product-img-wrapper">
                    <img src="https://images.unsplash.com/photo-1542272604-787c3835535d?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80"
                        alt="Straight Leg Trouser">
                </div>
                <div class="product-info">
                    <div>
                        <h3 class="product-title">Pleated Trouser - Ash</h3>
                        <p class="product-price">$145</p>
                    </div>
                </div>
            </a>

            <a href="product.html" class="product-card fade-in">
                <div class="product-img-wrapper">
                    <img src="https://images.unsplash.com/photo-1591047139829-d91aecb6caea?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80"
                        alt="Utility Jacket">
                </div>
                <div class="product-info">
                    <div>
                        <h3 class="product-title">Utility Zip Jacket - Onyx</h3>
                        <p class="product-price">$195</p>
                    </div>
                </div>
            </a>

            <a href="product.html" class="product-card fade-in">
                <div class="product-img-wrapper">
                    <img src="https://images.unsplash.com/photo-1576566588028-4147f3842f27?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80"
                        alt="Boxy Tee Black">
                </div>
                <div class="product-info">
                    <div>
                        <h3 class="product-title">Core Boxy Tee - Onyx</h3>
                        <p class="product-price">$55</p>
                    </div>
                </div>
            </a>

            <a href="product.html" class="product-card fade-in">
                <div class="product-img-wrapper">
                    <img src="https://images.unsplash.com/photo-1618354691438-25af057b3225?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80"

                </div>

        </section>
    </main>

        <div class="footer-bottom" style="border-top: none;">
            <p>&copy; 2026 BANYON STREET.</p>
            <div class="social-icons">

    </footer>

    <script src="script.js"></script>
</body>

</html>
